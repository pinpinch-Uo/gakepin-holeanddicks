<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テストページ1</title>
    <link rel="stylesheet"  type="text/css" href="https://pinpinch-uo.github.io/gakepin-holeanddicks/css/base.css">
</head>
<body>

    <!-- ヘッダー代わりの画像エリア（後ほどご自身で差し替え） -->
    <div class="header-placeholder">
        <p>※ここにヘッダー画像が表示されます</p>
    </div>

    <main>
        
<div class="main-container">
        <!-- 縞々の影を持つコンテナ -->
        <div class="m_c-ornament--boxshadow">
            
            <!-- ボックスの中身（黒枠） -->
            <div class="content-inner">
                
                <!-- 左側：テキストエリア -->
                <div class="text-area">
                    <h2 class="title"></h2>
                    <p class="t-description">
                        ここには説明文が入ります。左側にテキスト、右側に画像が配置されるレイアウトです。
                        枠線は黒で、外側には指定いただいた縞々のデザインが影として表示されます。
                        レスポンシブ対応も考慮しており、画面が狭くなると縦に並びます。
                    </p>
                </div>

                <!-- 右側：画像エリア -->
                <div class="image-area">
                    <!-- 任意の画像URLに差し替えてください -->
                    <img src="https://pinpinch-uo.github.io/gakepin-holeanddicks/image-box_fast-2.jpg" alt="イメージ画像">
                </div>

            </div>

        </div>
    </div>

</body>
</html>
        <!-- 以降、コンテンツが続く想定の余白 -->
        <div style="height: 5000px; background: #f9f9f9; text-align: center; padding-top: 50px;">
            <p>（ここに他のコンテンツや、後ほど作成するフォームが入ります）</p>
        </div>
    </main>

</body>
</html>
