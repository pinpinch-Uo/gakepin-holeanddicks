<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruit Concept - FAST</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- メインビジュアルセクション -->
    <section class="hero-section">
        <!-- 背景画像 (ここを自由に変更) -->
        <div class="hero-bg">
            <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070" alt="背景画像">
        </div>

        <div class="container">
            <div class="hero-content">
                
                <!-- 左側：メインキャッチコピー（枠線ボックス） -->
                <div class="main-copy-box">
                    <h1 class="main-title">
                        <span class="en">FAST</span>
                        <span class="ja">最速で、<br>最高を。</span>
                    </h1>
                </div>

                <!-- 右側：縦書きのテキストボックス -->
                <div class="vertical-text-box">
                    <p>成長を加速させる環境が、ここにある。</p>
                </div>

                <!-- 下部：サブリード（枠線ボックス） -->
                <div class="sub-lead-box">
                    <p>私たちは、変化を恐れず、<br>
                    誰よりも速く挑戦し続けるプロフェッショナル集団です。</p>
                </div>

            </div>
        </div>
    </section>

    <!-- ここから下に他のコンテンツやフォームを追加していく -->

</body>
</html>
