<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テストページ1</title>
    <link rel="stylesheet"  type="text/css" href="https://pinpinch-uo.github.io/gakepin-holeanddicks/css/base.css">
</head>
<body>

    <!-- ヘッダー代わりの画像エリア（後ほどご自身で差し替え） -->
    <div class="header-placeholder">
        <p>※ここにヘッダー画像が表示されます</p>
    </div>

    <main>
        <!-- メインビジュアルセクション -->
        <section class="hero-section">
            <div class="container">
                <div class="hero-flex">
                    
                    <!-- 画像エリア -->
                    <div class="hero-image">
                        <!-- 好きな画像に変更してください -->
                        <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&q=80&w=1000" alt="メインビジュアル">
                    </div>

                    <!-- テキストボックスエリア -->
                    <div class="hero-text-box">
                        <div class="text-inner">
                            <span class="sub-title">FAST RECRUITING</span>
                            <h2 class="main-catch">
                                あなたの挑戦が、<br>
                                次の景色をつくる。
                            </h2>
                            <p class="description">
                                ここには説明文が入ります。創研ホールディングスのサイトのように、
                                枠線で囲まれたボックスの中に、想いやメッセージを記載してください。
                                自由に変更可能です。
                            </p>
                            <div class="deco-line"></div>
                        </div>
                    </div>

                </div>
            </div>
        </section>

        <!-- 以降、コンテンツが続く想定の余白 -->
        <div style="height: 500px; background: #f9f9f9; text-align: center; padding-top: 50px;">
            <p>（ここに他のコンテンツや、後ほど作成するフォームが入ります）</p>
        </div>
    </main>

</body>
</html>
